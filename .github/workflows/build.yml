name: Build Samsung Debug APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          architecture: x64
      
      - name: Setup Android SDK
        run: |
          flutter config --android-sdk /opt/android-sdk
          echo "ANDROID_HOME=/opt/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/opt/android-sdk" >> $GITHUB_ENV
      
      - name: Install Android SDK components
        run: |
          yes | /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          /opt/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" 2>/dev/null || true
      
      - name: Enable hardware acceleration for Android emulator
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-kvm libvirt-daemon-system 2>/dev/null || true
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Build Samsung debug APK
        run: flutter build apk --debug --target-platform android-arm64 2>&1 | tail -20
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: livebridge-samsung-debug
          path: build/app/outputs/flutter-apk/app-arm64-debug.apk
          retention-days: 7
      
      - name: Upload APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-arm64-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
